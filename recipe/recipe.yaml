schema_version: 1

context:
  version: "2.0.4"

package:
  name: trame-dataclass
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/trame-dataclass/trame_dataclass-${{ version }}.tar.gz
  sha256: 4f43b9f259942cefda22630c442d334d1c38dddea83f8c3fd4665a687fa20c74

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - trame-client >=3.10
    - loguru
    {% if python_version == "3.13" %}
    - typing_extensions
    {% endif %}

tests:
  - python:
      imports:
        - trame_dataclass
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Dataclass for trame UI binding
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/trame-dataclass/

extra:
  recipe-maintainers:
    - jourdain
    - psavery
    - alesgenova
