schema_version: 1

context:
  version: "2.0.6"

package:
  name: trame-dataclass
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/trame-dataclass/trame_dataclass-${{ version }}.tar.gz
  sha256: acf49bbeec5c05b9983a4718ae37aef38998aeb92cc7dbba0324f7ce98837ec5

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - trame-client >=3.10
    - loguru
    - if: match(python, "==3.13")
        then:
        - typing_extensions

tests:
  - python:
      imports:
        - trame_dataclass
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Dataclass for trame UI binding
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pypi.org/project/trame-dataclass/

extra:
  recipe-maintainers:
    - jourdain
    - psavery
    - alesgenova
